<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shotclock Kiosk</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        cursor: none !important;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: none !important;
      }
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        cursor: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
